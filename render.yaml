services:
  - type: web
    name: musa
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: FALLBACK_AUTH
        value: "1"
